kind = "mobile"
previewPath = "/"
title = "KisanSetu"
version = "1.0.0"
id = "artifacts/kisan-setu"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22517

[services.development]
run = "pnpm --filter @workspace/kisan-setu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kisan-setu", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/kisan-setu", "run", "serve" ]

[services.env]
PORT = "22517"
BASE_PATH = "/"
